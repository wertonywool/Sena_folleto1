<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sena Folleto - Josue Bermudez</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="bg-animation"></div>
    
    <main id="container">
        <!-- Intro Section -->
        <section id="intro" class="active">
            <h1 class="glitch" data-text="hola maestra html">hola maestra html</h1>
            <p class="subtitle">de josue bermudez botache</p>
            <p class="sena">aprendiz sena</p>
            <button id="start-btn">Abrir Folleto</button>
        </section>

        <!-- Page 1 -->
        <section id="page-1" class="hidden">
            <div class="image-container">
                <img src="parte 1.png" alt="Folleto Parte 1">
            </div>
            <button class="next-btn" data-next="page-2">Siguiente</button>
        </section>

        <!-- Page 2 -->
        <section id="page-2" class="hidden">
            <div class="image-container">
                <img src="parte 2.png" alt="Folleto Parte 2">
            </div>
            <button class="next-btn" data-next="page-3">Siguiente</button>
        </section>

        <!-- Page 3 -->
        <section id="page-3" class="hidden">
            <div class="image-container">
                <img src="parte 3.png" alt="Folleto Parte 3">
            </div>
            <button class="next-btn" data-next="final">Finalizar</button>
        </section>

        <!-- Final Section -->
        <section id="final" class="hidden">
            <h2 class="glitch" data-text="¡Gracias por ver!">¡Gracias por ver!</h2>
            <p>Puedes descargar o ver el folleto completo aquí:</p>
            <a href="Completo .pdf" target="_blank" class="pdf-btn">Abrir PDF Completo</a>
            <button id="restart-btn">Volver al inicio</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
